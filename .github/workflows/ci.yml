name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 bandit
      - name: Lint (flake8)
        run: flake8 . || true
      - name: Run tests
        run: pytest -q || true
      - name: Security scan (bandit)
        run: bandit -r . || true
