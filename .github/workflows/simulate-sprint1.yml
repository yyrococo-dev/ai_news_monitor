name: Simulate Sprint-1

on:
  push:
    branches: [ feature/ai-dev-sample ]
  pull_request:
    branches: [ main ]

jobs:
  simulate-sprint1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps (none required for simulation)
        run: |
          python -m pip install --upgrade pip

      - name: Run Sprint-1 simulation
        env:
          PYTHONPATH: "${{ github.workspace }}"
          JIRA_ISSUE_KEY: KAN-TEST
        run: |
          python3 dev_skill/examples/simulate_sprint1.py

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint1-simulation-reports
          path: |
            reports/**
            projects/**
