name: Simulate Sprint-2

on:
  push:
    branches: [ feature/ai-dev-sample ]
  pull_request:
    branches: [ main ]

jobs:
  simulate-sprint2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run Sprint-2 simulation
        env:
          PYTHONPATH: "${{ github.workspace }}"
          JIRA_ISSUE_KEY: KAN-TEST
        run: |
          python3 dev_skill/examples/simulate_sprint2.py

      - name: Run unit tests
        run: |
          python -m pip install pytest
          pytest -q

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sprint2-simulation
          path: |
            reports/**
            projects/**
            tests/**
